name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  zig:
    name: Zig
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Check formatting
        run: zig fmt --check build.zig src/main.zig src/root.zig

      - name: Run tests
        run: zig build test

  nix:
    name: Nix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Nix
        uses: cachix/install-nix-action@v31

      - name: Check flake
        run: nix flake check --print-build-logs

      - name: Build package
        run: nix build .#neonfetch --print-build-logs
